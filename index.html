*{box-sizing:border-box} :root{--bg:#f5f4f0;--panel:#fff;--text:#181818;--muted:#707070;--line:#e5e1d8;--soft:#f7f6f2;--black:#181818;--danger:#b42318;--warn:#fff7e4;--warnline:#f1d99c} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)} button,input,textarea{font-family:inherit}.page{max-width:1680px;margin:0 auto;padding:22px;display: flex;
flex-direction: column;}.topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:16px}.badge{display:inline-flex;padding:7px 12px;border:1px solid var(--line);background:#fff;border-radius:999px;color:#555;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.035)}h1{margin:10px 0 0;font-size:30px;letter-spacing:-.04em;line-height:1.12}.intro{margin:8px 0 0;max-width:900px;color:var(--muted);line-height:1.55;font-size:14px}.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.btn{border:0;background:var(--black);color:#fff;border-radius:14px;padding:10px 14px;cursor:pointer;font-size:14px;white-space:nowrap;transition:.18s}.btn:hover{transform:translateY(-1px);opacity:.92}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.danger{background:#fff;color:var(--danger);border:1px solid #efc4bf}.btn.small{padding:7px 10px;border-radius:11px;font-size:12px}.layout{display:grid;grid-template-columns:180px minmax(0,1fr)420px;gap:14px;align-items:start}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.04)}.sidebar{padding:10px;position:sticky;top:16px}.nav-btn{width:100%;border:1px solid transparent;background:transparent;border-radius:16px;padding:12px;text-align:left;cursor:pointer;color:#555;margin-bottom:6px;transition:.16s}.nav-btn:hover{background:var(--soft);color:var(--text)}.nav-btn.active{background:var(--black);color:#fff}.nav-title{display:block;font-weight:700;font-size:14px}.nav-sub{display:block;margin-top:5px;font-size:12px;opacity:.75;line-height:1.35}.main-panel{padding:16px;min-height:720px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.section-head h2{margin:0;font-size:22px;letter-spacing:-.03em}.section-desc{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.55}.basic-grid{display:grid;gap:12px}.field{display:grid;gap:7px}.label{font-size:13px;color:#3d3d3d;font-weight:700}textarea,input{width:100%;outline:0;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px;font-size:14px;line-height:1.55;resize:vertical}textarea:focus,input:focus{border-color:#1f1f1f}.basic-textarea{min-height:84px}.accordion{display:grid;gap:10px}.module{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}.module-head{width:100%;border:0;background:#fff;padding:13px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left}.module-head:hover{background:var(--soft)}.module-title{display:block;font-weight:800;font-size:15px}.module-selected{display:block;margin-top:5px;color:var(--muted);font-size:12px;line-height:1.4;max-width:860px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chevron{flex:0 0 auto;font-size:14px;opacity:.65}.module-body{display:none;padding:0 14px 14px;border-top:1px solid var(--line);background:#fff}.module.open .module-body{display:block}.option-grid{display:flex;flex-wrap:wrap;gap:8px;padding-top:12px}.chip{border:1px solid var(--line);background:var(--soft);color:#2a2a2a;border-radius:999px;padding:9px 12px;font-size:13px;cursor:pointer;transition:.15s}.chip:hover{border-color:#aaa;background:#fff}.chip.active{background:var(--black);color:#fff;border-color:var(--black)}.custom-row{margin-top:12px;display:grid;gap:7px}.custom-row textarea{min-height:62px;border-radius:14px}.output-panel{padding:14px;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow:auto}.summary-box{background:#121212;color:#fff;border-radius:18px;padding:12px;line-height:1.65;font-size:13px;margin-bottom:12px}.summary-title{font-weight:800;margin-bottom:4px}.summary-line{color:rgba(255,255,255,.82);margin-top:4px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}.tab{border:1px solid var(--line);background:var(--soft);border-radius:12px;padding:9px 6px;font-size:12px;cursor:pointer;color:#555}.tab.active{background:var(--black);color:#fff;border-color:var(--black)}.prompt-box{min-height:330px;max-height:420px;overflow:auto;white-space:pre-wrap;line-height:1.75;font-size:14px;color:#262626;background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:13px}.copy-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.hint{margin-top:10px;padding:10px;border-radius:16px;background:var(--warn);border:1px solid var(--warnline);color:#6a4a00;font-size:12px;line-height:1.6}.settings-panel{display:grid;gap:12px}.settings-module{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px}.settings-module-head{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;margin-bottom:10px}.settings-options{display:grid;gap:8px}.option-edit-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.option-edit-row input{border-radius:12px;padding:9px 10px}.settings-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.settings-footer{position:sticky;bottom:0;background:linear-gradient(rgba(255,255,255,.72),#fff 35%);padding:14px 0 0;display:flex;justify-content:flex-end;gap:8px}.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;justify-content:flex-end;z-index:50}.drawer-mask.show{display:flex}.drawer{width:min(720px,94vw);height:100vh;background:#fff;padding:18px;overflow:auto;box-shadow:-20px 0 60px rgba(0,0,0,.18)}.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.drawer h2{margin:0;font-size:22px;letter-spacing:-.03em}.list{display:grid;gap:10px}.record{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.record-time{color:var(--muted);font-size:12px;margin-bottom:8px}.record-text{font-size:13px;line-height:1.65;color:#252525;white-space:pre-wrap;max-height:150px;overflow:auto;background:var(--soft);border-radius:12px;padding:10px}.record-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}.stats-group{border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px;background:#fff}.stats-group h3{margin:0 0 8px;font-size:16px}.stats-module{margin:10px 0;padding:10px;border-radius:14px;background:var(--soft)}.stats-module-title{font-weight:800;font-size:13px;margin-bottom:6px}.stat-item{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05)}.stat-item:last-child{border-bottom:0}.empty{color:var(--muted);font-size:13px;line-height:1.6;padding:16px;text-align:center;background:var(--soft);border-radius:16px}.hidden-file{display:none}@media(max-width:1200px){.layout{grid-template-columns:160px minmax(0,1fr)}.output-panel{grid-column:1/-1;position:static;max-height:none}.prompt-box{max-height:320px}}@media(max-width:760px){.page{padding:14px}.topbar{flex-direction:column;align-items:flex-start}.actions{justify-content:flex-start}.layout{grid-template-columns:1fr}.sidebar{position:static;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.nav-btn{margin-bottom:0}.section-head{flex-direction:column}.copy-row{grid-template-columns:1fr}h1{font-size:25px}}

<body>
<main class="page">
<header class="topbar"><div><div class="badge">AI影像风格提示词工作台</div><h1>风格词生成器</h1><p class="intro">极简输入画面内容，通过前期摄影和后期风格两个专业维度，快速组合出可复用的影像风格提示词。</p></div><div class="actions"><button class="btn secondary" onclick="openStats()">统计</button><button class="btn secondary" onclick="openHistory()">历史记录</button><button class="btn secondary" onclick="exportJson()">导出JSON</button><button class="btn secondary" onclick="triggerImport()">导入JSON</button><button class="btn" onclick="copyCurrentPrompt()">复制提示词</button><input id="importFile" class="hidden-file" type="file" accept=".json,application/json" onchange="importJson(event)" /></div></header>
<section class="layout"><aside class="card sidebar" id="sidebar"></aside><section class="card main-panel" id="mainPanel"></section><aside class="card output-panel"><div class="summary-box"><div class="summary-title">已选风格摘要</div><div class="summary-line" id="summaryPre">前期：暂无</div><div class="summary-line" id="summaryPost">后期：暂无</div></div><div class="tabs"><button class="tab active" data-tab="full" onclick="setOutputTab('full')">完整提示词</button><button class="tab" data-tab="style" onclick="setOutputTab('style')">仅风格词</button><button class="tab" data-tab="structured" onclick="setOutputTab('structured')">结构化模板</button></div><div class="prompt-box" id="promptBox"></div><div class="copy-row"><button class="btn" onclick="copyCurrentPrompt()">复制当前输出</button><button class="btn secondary" onclick="saveToLocal(true)">保存到浏览器</button></div><div class="hint">点击复制后，系统才会记录历史和统计用词。历史最多保存最近 200 条。</div></aside></section>
<footer class="footer-credit">
    Style Prompt Tool · by 山月
  </footer>

</main>
<div class="drawer-mask" id="drawerMask" onclick="closeDrawer(event)"><aside class="drawer" id="drawer"></aside></div>
<script>
const STORAGE_KEY='visual_prompt_workspace_v1';
function makeId(prefix){return prefix+'_'+Math.random().toString(36).slice(2,9)+'_'+Date.now().toString(36)}
const DEFAULT_STATE={activeSection:'pre',outputTab:'full',basic:{subject:'',scene:'',action:''},sections:[{id:'basic',title:'基础内容',subtitle:'拍什么',desc:'只做极简输入，不做复杂预设。',editable:false,modules:[]},{id:'pre',title:'前期摄影',subtitle:'怎么拍',desc:'用摄影语言控制光线、焦段、景深、景别、机位和构图。',editable:true,modules:[{id:makeId('m'),title:'光线方向',desc:'控制光从哪里来，以及明暗结构如何形成。',open:true,options:['自然顺光','侧光','侧逆光','逆光','伦勃朗光','窗边光','发丝光','黄昏低角度阳光'],selected:[],custom:''},{id:makeId('m'),title:'镜头焦段',desc:'控制空间透视、环境压缩和人物距离感。',open:false,options:['超广角镜头','广角镜头','标准焦段','中焦镜头','中长焦镜头','长焦虚化'],selected:[],custom:''},{id:makeId('m'),title:'景深范围',desc:'控制主体清晰范围、背景虚化和焦点质感。',open:false,options:['大光圈','浅景深','深景深','轻微对焦模糊','主体清晰背景虚化','前景虚化遮挡'],selected:[],custom:''},{id:makeId('m'),title:'景别距离',desc:'控制画面是远景、中景、近景还是特写。',open:false,options:['大远景','远景','中远景','中景','近景','特写','大场景构图'],selected:[],custom:''},{id:makeId('m'),title:'机位角度',desc:'控制镜头站位和观察角度。',open:false,options:['平视','轻微俯视','俯视','低机位仰拍','第一视角','背影视角','侧面跟拍'],selected:[],custom:''},{id:makeId('m'),title:'构图关系',desc:'控制主体与环境、留白、前中后景之间的关系。',open:false,options:['主体居中','主体偏右','主体偏左','大面积环境留白','人物融入自然环境','前景遮挡构图','三分法构图','大场景人物小比例'],selected:[],custom:''}]},{id:'post',title:'后期风格',subtitle:'怎么调',desc:'用后期语言控制曝光、对比、黑位、白位、色彩、颗粒和锐度。',editable:true,modules:[{id:makeId('m'),title:'曝光基准',desc:'控制画面整体亮度和明暗基调。',open:true,options:['明亮清透','正常曝光','轻微过曝感','低曝光情绪感','柔和高调','自然不过曝'],selected:[],custom:''},{id:makeId('m'),title:'对比曲线',desc:'控制明暗反差和画面硬朗程度。',open:false,options:['低对比','中低对比','中等对比','高对比','柔和曲线','黑柔滤镜降低硬反差'],selected:[],custom:''},{id:makeId('m'),title:'黑位密度',desc:'控制暗部是厚重、柔和，还是偏灰。',open:false,options:['黑位柔和','暗部不死黑','轻微胶片灰度','黑位厚重','暗部细节保留','低黑位清透感'],selected:[],custom:''},{id:makeId('m'),title:'白位控制',desc:'控制高光和白色区域是否干净、柔和、过曝。',open:false,options:['白位干净','高光不过曝','高光柔和','发丝高光发亮','白色区域清透','阳光边缘光'],selected:[],custom:''},{id:makeId('m'),title:'色彩倾向',desc:'控制整体色彩方向和情绪倾向。',open:false,options:['暖调胶片色彩','清新自然色调','富士胶片色调','低饱和高级感','春日阳光感','绿色自然环境色','温柔家庭片色调'],selected:[],custom:''},{id:makeId('m'),title:'颗粒锐度',desc:'控制胶片颗粒、肌理、锐度和动态质感。',open:false,options:['细腻胶片颗粒','明显胶片颗粒感','真实肌理质感','柔和锐度','轻微动态模糊','慢快门拖影','黑柔滤镜质感'],selected:[],custom:''}]},{id:'negative',title:'负面限制',subtitle:'不要什么',desc:'用于减少文字、水印、畸形、塑料感和不稳定画面。',editable:true,modules:[{id:makeId('m'),title:'画面限制',desc:'控制画面中不应该出现的杂质。',open:true,options:['不要文字','不要水印','不要logo','不要边框','不要杂乱背景','不要低清晰度'],selected:['不要文字','不要水印','不要logo'],custom:''},{id:makeId('m'),title:'人物限制',desc:'控制人物五官、肢体和数量稳定。',open:false,options:['不要多余人物','不要畸形手指','不要五官变化','不要年龄变化','不要夸张表情','不要肢体穿帮'],selected:[],custom:''},{id:makeId('m'),title:'风格限制',desc:'控制画面不要偏离真实摄影质感。',open:false,options:['不要卡通感','不要塑料质感','不要过度锐化','不要过曝','不要画面闪烁','不要镜头突然跳切'],selected:[],custom:''},{id:makeId('m'),title:'产品限制',desc:'涉及产品时，控制产品结构稳定。',open:false,options:['不要改变产品结构','不要改变材质','不要缺失轮子','不要多出零件','保持比例真实','保持细节准确'],selected:[],custom:''}]}],history:[],stats:{}};
let state=loadState(),editingSectionId=null,editingDraft=null;
function clone(o){return JSON.parse(JSON.stringify(o))}function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function attr(s){return esc(s).replaceAll('\n',' ')}function css(s){return window.CSS&&CSS.escape?CSS.escape(s):String(s).replace(/[^a-zA-Z0-9_-]/g,'\\$&')}
function loadState(){try{let saved=localStorage.getItem(STORAGE_KEY);return saved?normalize(JSON.parse(saved)):clone(DEFAULT_STATE)}catch(e){return clone(DEFAULT_STATE)}}
function normalize(input){let out=Object.assign(clone(DEFAULT_STATE),input||{});if(!out.basic)out.basic={subject:'',scene:'',action:''};if(!Array.isArray(out.sections))out.sections=clone(DEFAULT_STATE.sections);if(!Array.isArray(out.history))out.history=[];if(!out.stats||typeof out.stats!=='object')out.stats={};out.sections.forEach(sec=>{if(!Array.isArray(sec.modules))sec.modules=[];sec.modules.forEach(m=>{if(!m.id)m.id=makeId('m');if(!Array.isArray(m.options))m.options=[];if(!Array.isArray(m.selected))m.selected=[];m.selected=m.selected.filter(x=>m.options.includes(x));if(typeof m.custom!=='string')m.custom='';if(typeof m.open!=='boolean')m.open=false})});out.history=out.history.slice(0,200);return out}
function saveToLocal(show){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));if(show)alert('已保存到当前浏览器。')}function getSection(id){return state.sections.find(s=>s.id===id)}function currentSection(){return getSection(state.activeSection)||state.sections[1]}
function render(){renderSidebar();renderMain();renderOutput();saveToLocal(false)}
function renderSidebar(){let el=document.getElementById('sidebar');el.innerHTML='';state.sections.forEach(sec=>{let b=document.createElement('button');b.className='nav-btn'+(state.activeSection===sec.id?' active':'');b.onclick=()=>{state.activeSection=sec.id;render()};b.innerHTML=`<span class="nav-title">${esc(sec.title)}</span><span class="nav-sub">${esc(sec.subtitle||'')}</span>`;el.appendChild(b)})}
function renderMain(){let sec=currentSection(),panel=document.getElementById('mainPanel');if(state.activeSection==='basic'){panel.innerHTML=`<div class="section-head"><div><h2>${esc(sec.title)}</h2><p class="section-desc">${esc(sec.desc)}</p></div></div><div class="basic-grid"><div class="field"><label class="label">主体对象</label><textarea class="basic-textarea" id="basicSubject" placeholder="例如：6岁可爱小女孩背影">${esc(state.basic.subject)}</textarea></div><div class="field"><label class="label">场景环境</label><textarea class="basic-textarea" id="basicScene" placeholder="例如：户外自然景观，春日阳光，湖边草坡">${esc(state.basic.scene)}</textarea></div><div class="field"><label class="label">动作状态</label><textarea class="basic-textarea" id="basicAction" placeholder="例如：正在学骑自行车，碎发丝随风飘起">${esc(state.basic.action)}</textarea></div></div>`;['Subject','Scene','Action'].forEach(k=>document.getElementById('basic'+k).addEventListener('input',e=>{state.basic[k.toLowerCase()]=e.target.value;renderOutput();saveToLocal(false)}));return}if(editingSectionId===sec.id){renderSettings(panel,sec);return}panel.innerHTML=`<div class="section-head"><div><h2>${esc(sec.title)}</h2><p class="section-desc">${esc(sec.desc)}</p></div><div>${sec.editable?`<button class="btn secondary small" onclick="enterSettings('${sec.id}')">设置</button>`:''}</div></div><div class="accordion" id="accordion"></div>`;let acc=document.getElementById('accordion');sec.modules.forEach(m=>{let div=document.createElement('div');div.className='module'+(m.open?' open':'');div.innerHTML=`<button class="module-head" onclick="toggleModule('${sec.id}','${m.id}')"><span><span class="module-title">${esc(m.title)}</span><span class="module-selected">已选：${esc(getModuleText(m)||'暂无选择')}</span></span><span class="chevron">${m.open?'收起 ▲':'展开 ▼'}</span></button><div class="module-body"><div class="option-grid">${m.options.map(o=>`<button class="chip ${m.selected.includes(o)?'active':''}" onclick="toggleOption('${sec.id}','${m.id}','${attr(o)}')">${esc(o)}</button>`).join('')}</div><div class="custom-row"><label class="label">自定义补充</label><textarea id="custom_${m.id}" placeholder="可以补充这一项的专属描述">${esc(m.custom)}</textarea></div></div>`;acc.appendChild(div);let custom=div.querySelector('#custom_'+css(m.id));if(custom)custom.addEventListener('input',e=>{m.custom=e.target.value;renderOutput();saveToLocal(false)})})}
function renderSettings(panel,sec){let d=editingDraft;panel.innerHTML=`<div class="section-head"><div><h2>${esc(sec.title)} 设置</h2><p class="section-desc">集中编辑小模块和预设词，编辑完成后统一保存。</p></div></div><div class="settings-panel" id="settingsPanel"></div><div class="settings-footer"><button class="btn secondary" onclick="addSettingsModule()">新增小模块</button><button class="btn secondary" onclick="cancelSettings()">取消</button><button class="btn" onclick="saveSettings()">保存设置</button></div>`;let p=document.getElementById('settingsPanel');d.modules.forEach((m,i)=>{let box=document.createElement('div');box.className='settings-module';box.innerHTML=`<div class="settings-module-head"><div class="field"><label class="label">小模块名称</label><input value="${attr(m.title)}" oninput="updateSettingsModuleTitle(${i},this.value)" /></div><button class="btn danger small" onclick="deleteSettingsModule(${i})">删除小模块</button></div><div class="field"><label class="label">说明</label><input value="${attr(m.desc||'')}" oninput="updateSettingsModuleDesc(${i},this.value)" /></div><div class="settings-options">${(m.options||[]).map((o,j)=>`<div class="option-edit-row"><input value="${attr(o)}" oninput="updateSettingsOption(${i},${j},this.value)" /><button class="btn danger small" onclick="deleteSettingsOption(${i},${j})">删除</button></div>`).join('')}</div><div class="settings-actions"><button class="btn secondary small" onclick="addSettingsOption(${i})">新增预设词</button><button class="btn secondary small" onclick="moveSettingsModule(${i},-1)">上移</button><button class="btn secondary small" onclick="moveSettingsModule(${i},1)">下移</button></div>`;p.appendChild(box)})}
function enterSettings(id){editingSectionId=id;editingDraft=clone(getSection(id));renderMain()}function cancelSettings(){editingSectionId=null;editingDraft=null;renderMain()}function saveSettings(){let idx=state.sections.findIndex(s=>s.id===editingSectionId);if(idx<0)return;let old=state.sections[idx],oldById={};old.modules.forEach(m=>oldById[m.id]=m);editingDraft.modules.forEach(m=>{if(!m.id)m.id=makeId('m');if(!Array.isArray(m.options))m.options=[];let o=oldById[m.id];m.selected=o?(o.selected||[]).filter(x=>m.options.includes(x)):[];m.custom=o?o.custom||'':'';m.open=o?!!o.open:false});state.sections[idx].modules=editingDraft.modules;editingSectionId=null;editingDraft=null;render()}function addSettingsModule(){editingDraft.modules.push({id:makeId('m'),title:'新小模块',desc:'',open:false,options:['新预设词'],selected:[],custom:''});renderMain()}function deleteSettingsModule(i){editingDraft.modules.splice(i,1);renderMain()}function updateSettingsModuleTitle(i,v){editingDraft.modules[i].title=v}function updateSettingsModuleDesc(i,v){editingDraft.modules[i].desc=v}function updateSettingsOption(i,j,v){editingDraft.modules[i].options[j]=v}function deleteSettingsOption(i,j){editingDraft.modules[i].options.splice(j,1);renderMain()}function addSettingsOption(i){editingDraft.modules[i].options.push('新预设词');renderMain()}function moveSettingsModule(i,d){let n=i+d;if(n<0||n>=editingDraft.modules.length)return;[editingDraft.modules[i],editingDraft.modules[n]]=[editingDraft.modules[n],editingDraft.modules[i]];renderMain()}
function toggleModule(secId,mId){let m=getSection(secId).modules.find(x=>x.id===mId);m.open=!m.open;renderMain();saveToLocal(false)}function toggleOption(secId,mId,opt){let m=getSection(secId).modules.find(x=>x.id===mId);m.selected=m.selected.includes(opt)?m.selected.filter(x=>x!==opt):[...m.selected,opt];render()}function getModuleText(m){let parts=[...(m.selected||[])],c=(m.custom||'').trim();if(c)parts.push(c);return parts.join('，')}function getSectionText(id){let s=getSection(id);return s?s.modules.map(getModuleText).filter(Boolean).join('，'):''}
function renderOutput(){document.getElementById('summaryPre').textContent='前期：'+(getSectionText('pre')||'暂无');document.getElementById('summaryPost').textContent='后期：'+(getSectionText('post')||'暂无');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===state.outputTab));document.getElementById('promptBox').textContent=buildOutput(state.outputTab)}function setOutputTab(t){state.outputTab=t;renderOutput();saveToLocal(false)}function buildOutput(t){return t==='style'?buildStylePrompt():t==='structured'?buildStructuredPrompt():buildFullPrompt()}function buildFullPrompt(){let basic=[state.basic.subject&&`画面主体为${state.basic.subject.trim()}`,state.basic.scene&&`场景发生在${state.basic.scene.trim()}`,state.basic.action&&`主体状态为${state.basic.action.trim()}`].filter(Boolean).join('，'),pre=getSectionText('pre'),post=getSectionText('post'),neg=getSectionText('negative'),parts=[];if(basic)parts.push(basic+'。');if(pre)parts.push('前期摄影采用'+pre+'。');if(post)parts.push('后期风格呈现'+post+'。');if(neg)parts.push('限制条件：'+neg+'。');return parts.join('')}function buildStylePrompt(){return [getSectionText('pre'),getSectionText('post')].filter(Boolean).join('，')||'暂无风格词'}function buildStructuredPrompt(){let lines=['【基础内容】',`主体对象：${state.basic.subject||'未填写'}`,`场景环境：${state.basic.scene||'未填写'}`,`动作状态：${state.basic.action||'未填写'}`];['pre','post','negative'].forEach(id=>{let s=getSection(id);lines.push('',`【${s.title}】`);s.modules.forEach(m=>lines.push(`${m.title}：${getModuleText(m)||'未选择'}`))});return lines.join('\n')}
function copyCurrentPrompt(){let full=buildFullPrompt(),cur=buildOutput(state.outputTab);copyText(cur||full,'已复制当前输出');if(full.trim()){recordCopy(full);updateUsageStats();saveToLocal(false)}}function recordCopy(prompt){state.history.unshift({id:makeId('h'),time:new Date().toLocaleString(),prompt});state.history=state.history.slice(0,200)}function updateUsageStats(){['pre','post','negative'].forEach(secId=>{let s=getSection(secId);if(!s)return;if(!state.stats[secId])state.stats[secId]={title:s.title,modules:{}};state.stats[secId].title=s.title;s.modules.forEach(m=>{let set=new Set([...(m.selected||[])]),c=(m.custom||'').trim();if(c)set.add(c);if(!set.size)return;if(!state.stats[secId].modules[m.id])state.stats[secId].modules[m.id]={title:m.title,items:{}};state.stats[secId].modules[m.id].title=m.title;set.forEach(item=>state.stats[secId].modules[m.id].items[item]=(state.stats[secId].modules[m.id].items[item]||0)+1)})})}async function copyText(text,msg){try{await navigator.clipboard.writeText(text);alert(msg)}catch(e){let t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert(msg)}}
function openDrawer(html){document.getElementById('drawer').innerHTML=html;document.getElementById('drawerMask').classList.add('show')}function closeDrawer(e){if(e&&e.target.id!=='drawerMask')return;document.getElementById('drawerMask').classList.remove('show')}
function openHistory(){let html=`<div class="drawer-head"><div><h2>复制历史记录</h2><p class="section-desc">最多保存最近 200 条，只保存完整提示词。</p></div><button class="btn secondary small" onclick="document.getElementById('drawerMask').classList.remove('show')">关闭</button></div><div class="actions" style="justify-content:flex-start;margin-bottom:12px"><button class="btn danger small" onclick="clearHistory()">清空历史</button></div><div class="list">${state.history.length?state.history.map(item=>`<div class="record"><div class="record-time">${esc(item.time)}</div><div class="record-text">${esc(item.prompt)}</div><div class="record-actions"><button class="btn secondary small" onclick="copyHistory('${item.id}')">复制</button><button class="btn danger small" onclick="deleteHistory('${item.id}')">删除</button></div></div>`).join(''):'<div class="empty">暂无复制历史。复制提示词后会自动记录。</div>'}</div>`;openDrawer(html)}function copyHistory(id){let item=state.history.find(h=>h.id===id);if(item)copyText(item.prompt,'已复制这条历史提示词')}function deleteHistory(id){state.history=state.history.filter(h=>h.id!==id);saveToLocal(false);openHistory()}function clearHistory(){if(!confirm('确定清空全部历史记录吗？'))return;state.history=[];saveToLocal(false);openHistory()}
function openStats(){let statsHtml=['pre','post','negative'].map(secId=>{let g=state.stats[secId];if(!g)return'';let mods=Object.values(g.modules||{}).map(m=>{let items=Object.entries(m.items||{}).sort((a,b)=>b[1]-a[1]);if(!items.length)return'';return`<div class="stats-module"><div class="stats-module-title">${esc(m.title)}</div>${items.map(([name,count])=>`<div class="stat-item"><span>${esc(name)}</span><strong>${count}次</strong></div>`).join('')}</div>`}).join('');return mods?`<div class="stats-group"><h3>${esc(g.title)}</h3>${mods}</div>`:''}).join('');let html=`<div class="drawer-head"><div><h2>提示词使用统计</h2><p class="section-desc">只有点击复制提示词后才会统计。同一次复制中，同一个词只统计一次。</p></div><button class="btn secondary small" onclick="document.getElementById('drawerMask').classList.remove('show')">关闭</button></div><div class="actions" style="justify-content:flex-start;margin-bottom:12px"><button class="btn danger small" onclick="clearStats()">清空统计</button></div>${statsHtml||'<div class="empty">暂无统计数据。复制提示词后会自动记录。</div>'}`;openDrawer(html)}function clearStats(){if(!confirm('确定清空全部统计数据吗？'))return;state.stats={};saveToLocal(false);openStats()}
function exportJson(){let data={app:'AI影像风格提示词工作台',version:'1.0',exportedAt:new Date().toISOString(),state};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='AI影像风格提示词工作台配置.json';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),300)}function triggerImport(){document.getElementById('importFile').click()}function importJson(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=ev=>{try{let data=JSON.parse(ev.target.result);state=normalize(data.state||data);saveToLocal(false);render();alert('导入成功。')}catch(err){alert('导入失败：JSON 文件格式不正确。')}};r.readAsText(f,'utf-8');e.target.value=''}
render();
